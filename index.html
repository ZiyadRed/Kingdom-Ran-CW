<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/ranhq-icon.webp" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="RanHQ is a fan-made English companion for Kingdom Ran's Castle War mode: browse general skills, build parties, compare buffs, and plan stronger teams." />
    <meta name="theme-color" content="#06264C" />
    <link rel="canonical" href="https://ranhq.vercel.app/" />
    <title>RanHQ — Kingdom Ran Castle War Companion</title>

    <!-- Open Graph (Discord / Facebook link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RanHQ" />
    <meta property="og:title" content="RanHQ — Kingdom Ran Castle War Companion" />
    <meta property="og:description" content="Browse general skills, build parties, compare buffs, and plan stronger Castle War teams for Kingdom Ran." />
    <meta property="og:url" content="https://ranhq.vercel.app/" />
    <meta property="og:image" content="https://ranhq.vercel.app/ranhq-og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RanHQ — Kingdom Ran Castle War companion" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RanHQ — Kingdom Ran Castle War Companion" />
    <meta name="twitter:description" content="Browse general skills, build parties, compare buffs, and plan stronger Castle War teams for Kingdom Ran." />
    <meta name="twitter:image" content="https://ranhq.vercel.app/ranhq-og.jpg" />

    <!-- Preload critical assets: hero banner is the LCP element on Home.
         The browser picks the right size from imagesrcset (matches the <img srcset>). -->
    <link rel="preload" href="/ranhq-icon.webp" as="image" type="image/webp" />
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/ranhq-home-banner-1200.webp"
      imagesrcset="/ranhq-home-banner-640.webp 640w, /ranhq-home-banner-1200.webp 1200w, /ranhq-home-banner.webp 1881w"
      imagesizes="(max-width: 1560px) 100vw, 1560px"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
